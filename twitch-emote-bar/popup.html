<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Twitch Emote Bar</title>
  <style>
    :root {
      --bg: #0e0c15;
      --surface: #1a1625;
      --surface2: #231e32;
      --border: #2e2845;
      --accent: #9147ff;
      --accent2: #bf93ff;
      --text: #efebff;
      --text-dim: #8b82a8;
      --drag-over: rgba(145, 71, 255, 0.25);
      --emote-size: 48px;
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'Noto Sans JP', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ===== Header ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px 8px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-icon {
      width: 20px;
      height: 20px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
    }

    .header-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.03em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .emote-count {
      font-size: 11px;
      color: var(--text-dim);
      background: var(--surface2);
      padding: 2px 8px;
      border-radius: 99px;
      border: 1px solid var(--border);
    }

    .btn-icon {
      background: transparent;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      width: 26px;
      height: 26px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      transition: background 0.15s, color 0.15s;
    }

    .btn-icon:hover {
      background: var(--surface2);
      color: var(--text);
    }

    /* ===== Search ===== */
    .search-wrap {
      padding: 8px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .search-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 12px;
      padding: 6px 10px;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input:focus {
      border-color: var(--accent);
    }

    .search-input::placeholder {
      color: var(--text-dim);
    }

    /* ===== Toolbar ===== */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg);
    }

    .toolbar-label {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      flex: 1;
    }

    .btn-sm {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text-dim);
      font-size: 11px;
      padding: 3px 9px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .btn-sm:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ===== Emote Grid ===== */
    .emote-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px 12px;
    }

    .emote-scroll::-webkit-scrollbar {
      width: 5px;
    }

    .emote-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .emote-scroll::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 99px;
    }

    .emote-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(calc(var(--emote-size) + 12px), 1fr));
      gap: 6px;
    }

    .emote-cell {
      aspect-ratio: 1;
      position: relative;
      cursor: grab;
      border-radius: var(--radius);
      border: 1.5px solid transparent;
      background: var(--surface);
      transition: border-color 0.15s, background 0.15s, transform 0.12s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 6px 4px 4px;
      user-select: none;
    }

    .emote-cell:hover {
      border-color: var(--accent);
      background: var(--surface2);
      transform: scale(1.06);
      z-index: 2;
    }

    .emote-cell:active {
      cursor: grabbing;
      transform: scale(0.97);
    }

    .emote-cell.dragging {
      opacity: 0.4;
      border-color: var(--accent2);
      cursor: grabbing;
    }

    .emote-cell.drag-over {
      background: var(--drag-over);
      border-color: var(--accent);
      border-style: dashed;
    }

    .emote-cell img {
      width: var(--emote-size);
      height: var(--emote-size);
      object-fit: contain;
      pointer-events: none;
      image-rendering: auto;
    }

    .emote-label {
      font-size: 9px;
      color: var(--text-dim);
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: center;
      line-height: 1.2;
    }

    /* ===== Empty / Loading ===== */
    .state-message {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--text-dim);
      font-size: 12px;
      text-align: center;
      padding: 20px;
    }

    .state-icon {
      font-size: 36px;
      opacity: 0.5;
    }

    .state-message p {
      line-height: 1.6;
    }

    .state-message strong {
      color: var(--accent2);
    }

    /* ===== Size slider ===== */
    .size-control {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .size-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 70px;
      height: 3px;
      border-radius: 99px;
      background: var(--border);
      outline: none;
    }

    .size-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    /* ===== Tooltip ===== */
    .emote-cell[data-emote-id]::after {
      content: attr(data-emote-id);
      position: absolute;
      bottom: calc(100% + 5px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 11px;
      padding: 3px 7px;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 100;
    }

    .emote-cell[data-emote-id]:hover::after {
      opacity: 1;
    }

    /* ===== Refresh indicator ===== */
    .refresh-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .btn-refresh {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text-dim);
      font-size: 11px;
      padding: 3px 9px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background 0.15s, color 0.15s;
    }

    .btn-refresh:hover {
      background: var(--surface2);
      color: var(--text);
    }

    /* ===== Insert feedback ===== */
    .emote-cell.inserted {
      animation: flash 0.4s ease;
    }

    @keyframes flash {
      0%   { background: rgba(145, 71, 255, 0.5); border-color: var(--accent); }
      100% { background: var(--surface); border-color: transparent; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <div class="header-icon">✦</div>
      <span class="header-title">Emote Bar</span>
      <div class="refresh-dot" id="refreshDot" title="エモートピッカーを開くと自動取得されます"></div>
    </div>
    <div class="header-right">
      <span class="emote-count" id="emoteCount">0 エモート</span>
      <button class="btn-icon" id="closeBtn" title="閉じる">✕</button>
    </div>
  </div>

  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="text" placeholder="エモートを検索…" autocomplete="off">
  </div>

  <div class="toolbar">
    <span class="toolbar-label">エモート一覧</span>
    <div class="size-control">
      <span style="font-size:10px;color:var(--text-dim)">サイズ</span>
      <input class="size-slider" id="sizeSlider" type="range" min="32" max="72" value="48">
    </div>
    <button class="btn-sm" id="resetOrderBtn">順序リセット</button>
  </div>

  <div class="emote-scroll" id="emoteScroll">
    <div class="state-message" id="stateMessage">
      <div class="state-icon">😊</div>
      <p>Twitchのエモートピッカーを開くと<br>エモートが自動的に取得されます。</p>
      <p style="font-size:11px"><strong>スタンプ</strong>ボタンをクリックしてみてください。</p>
    </div>
    <div class="emote-grid" id="emoteGrid" style="display:none"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
